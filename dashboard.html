<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AGvoid Dashboard</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<div class="sidebar">
  <h2>AGvoid</h2>
  <a href="dashboard.html">Dashboard</a>
  <a href="index.html">Simulation</a>
</div>

<div class="main">

  <h1>System Dashboard</h1>

  <div class="card">
    <h3>Simulation Control</h3>

    <input id="load" placeholder="Load">
    <input id="energy" placeholder="Energy">

    <button onclick="runSim()">Run Simulation</button>
  </div>

  <div class="card">
    <h3>Results</h3>
    <p>Status: <span id="status">--</span></p>
    <p>Efficiency: <span id="eff">--</span></p>
    <p>Loss: <span id="loss">--</span></p>
  </div>

  <div class="card">
    <h3>Logs</h3>
    <pre id="logs"></pre>
  </div>

</div>

<script src="assets/js/app.js"></script>
</body>
</html>
